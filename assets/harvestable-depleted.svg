<!-- Create a harvestable-depleted.svg in your assets directory -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Main circle -->
  <circle cx="50" cy="50" r="46" fill="#555555" stroke="#9E9E9E" stroke-width="5" stroke-dasharray="10,5"/>
  
  <!-- Mortar and pestle icon but crossed out -->
  <g fill="#aaaaaa">
    <!-- Pestle handle -->
    <rect x="30" y="20" width="10" height="40" rx="5" transform="rotate(30, 35, 40)"/>
    
    <!-- Mortar -->
    <path d="M65,65 C80,65 85,55 85,45 C85,35 75,35 65,35 C45,35 40,50 40,65 Z" />
    
    <!-- Bowl interior -->
    <path d="M65,60 C75,60 80,52 80,45 C80,38 72,40 65,40 C50,40 45,50 45,60 Z" fill="#555555"/>
  </g>
  
  <!-- X mark across -->
  <line x1="25" y1="25" x2="75" y2="75" stroke="#FF5252" stroke-width="8" stroke-linecap="round"/>
  <line x1="75" y1="25" x2="25" y2="75" stroke="#FF5252" stroke-width="8" stroke-linecap="round"/>
</svg>