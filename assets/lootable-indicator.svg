<!-- Create a lootable-indicator.svg in your assets directory -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Main circle -->
  <circle cx="50" cy="50" r="46" fill="#7D4A00" stroke="#FF9800" stroke-width="5"/>
  
  <!-- Treasure chest icon -->
  <g fill="#ffffff">
    <!-- Chest base -->
    <path d="M25,40 L75,40 L75,70 L25,70 Z" />
    
    <!-- Chest lid -->
    <path d="M20,40 L80,40 L75,30 L25,30 Z" />
    
    <!-- Lock -->
    <rect x="45" y="35" width="10" height="15" rx="2" />
    
    <!-- Gold coins -->
    <circle cx="35" cy="60" r="5" fill="#FFC107" />
    <circle cx="45" cy="65" r="5" fill="#FFC107" />
    <circle cx="60" cy="60" r="5" fill="#FFC107" />
  </g>
  
  <!-- Highlight -->
  <circle cx="70" cy="35" r="3" fill="white" opacity="0.8" />
</svg>